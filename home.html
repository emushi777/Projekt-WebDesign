<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlight Pages Bookstore</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <img src="logo.png" class="sidebar-icon" alt="logo">
            <span class="sidebar-title">
            <span class="pink">Moonlight</span><span class="black">Pages</span>
            </span>
        </div>

        <ul class="sidebar-menu">
            <li>
                <a href="home.html"><img src="home.png" class="menu-icon" alt="">
                Home
                </a>
            </li>
            <li>
                <img src="browse.png" class="menu-icon" alt="">
                Browse Books
            </li>
            <li>
                <img src="heart.png" class="menu-icon" alt="">
                Favorites
            </li>
            <li>
                <img src="account.png" class="menu-icon" alt="">
                My account
            </li>
        </ul>
    </div>

    <div class="search-bar">
        <div class="search-wrapper">
            <img src="search.png" class="search-icon" alt="">
            <input type="text" placeholder="Search your favorite books">
        </div>
        
        <div class="top-buttons">
            <div class="notification-button">
                <img src="notifications.png" alt="notifications">
            </div>

            <div class="profile-button">
                <a href="login.html">
                    <img src="profile.png" alt="profile">
                </a>
            </div>
        </div>
    </div>

</body>
</html>
