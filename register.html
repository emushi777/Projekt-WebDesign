<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>

<div class="container">

    <h2>Create Account</h2>

    <div class="form-group">

        <div class="field">
            <input id="name" type="text" placeholder="Full Name">
            <p class="error" id="nameError">Name must be at least 3 characters.</p>
        </div>

        <div class="field">
            <input id="email" type="email" placeholder="Email">
            <p class="error" id="emailError">Please enter a valid email.</p>
        </div>

        <div class="field">
            <div class="password-wrapper">
                <input id="password" type="password" placeholder="Password">
                <ion-icon class="eye-icon" name="eye-outline" onclick="togglePassword('password', this)"></ion-icon>
            </div>
        <p class="error" id="passwordError">Password must be at least 6 characters.</p>
        </div>

        <div class="field">
            <div class="password-wrapper">
                <input id="confirmPassword" type="password" placeholder="Confirm Password">
                <ion-icon class="eye-icon" name="eye-outline" onclick="togglePassword('confirmPassword', this)"></ion-icon>
            </div>
            <p class="error" id="confirmPasswordError">Passwords do not match.</p>
        </div>

        <div class="field">
            <button onclick="validateRegister()">Register</button>
        </div>

    </div>

    <p class="link-text">Already have an account? <a href="login.html">Login</a></p>

</div>

<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

<script src="register.js"></script>
</body>
</html>
